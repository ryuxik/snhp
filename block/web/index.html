<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>THE BLOCK — a pixel street where every price is negotiated</title>
<meta name="description" content="Twin pixel-art NYC blocks — the STICKER block and the SNHP block — run the same week with the same people. One grays and thins as it converts fewer shoppers; the other keeps its crowd and pops receipts. Every dollar on screen is a real paired delta from the committed 10-venue block twin (reproducible from the seed); the day-by-day ramp and per-walker paths are a representative arc." />
<meta name="theme-color" content="#0d1020" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d1020'/%3E%3Crect x='3' y='6' width='3' height='7' fill='%23e58ab4'/%3E%3Crect x='7' y='4' width='3' height='9' fill='%23ffcf8a'/%3E%3Crect x='11' y='7' width='2' height='6' fill='%237fe0ff'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css?v=1" />

<div id="stage">
  <canvas id="view"></canvas>

  <!-- HUD: DOM over the letterboxed canvas. JS positions .anchor bits to the
       canvas rect each frame so labels/counters stay glued to their panels. -->
  <div id="hud">
    <div id="badge" title="Every dollar on screen is a real paired delta from the committed 10-venue twin (block/gen_week.py → canned-week.json; seed 20260710, bodega-adopts). The counters, per-venue deltas, receipt savings, deal frequency, crowd ratio and spoilage ORDER are reproducible from the seed. The day-by-day divergence ramp and the per-walker choreography are a representative arc, not a magnitude — see meta.provenance.">live sim data · aggregates real · walkers representative</div>

    <div id="label-sticker" class="panel-label sticker"><span class="dot"></span>STICKER BLOCK</div>
    <div id="label-snhp" class="panel-label snhp"><span class="dot"></span>SNHP BLOCK</div>

    <!-- the flip-clock scoreboard, docked on the seam between the two blocks -->
    <div id="scoreboard">
      <div class="score shopper">
        <div class="score-label">shoppers kept</div>
        <div class="flip" id="score-shopper"><span class="cur">$0</span></div>
      </div>
      <div class="score-vs">the difference is the deal</div>
      <div class="score merchant">
        <div class="score-label">merchants earned</div>
        <div class="flip" id="score-merchant"><span class="cur">+$0</span></div>
      </div>
    </div>

    <!-- the chunky jukebox dial + clock -->
    <div id="dock">
      <div id="clock-read"><span id="clock-day">DAY 1</span><span id="clock-time">—</span></div>
      <div id="knob" title="drag to scrub the week · 1 day ≈ 6s">
        <div id="knob-pointer"></div>
      </div>
      <div id="dock-meta">
        <button id="play" class="ico" aria-label="play / pause" title="play / pause">▮▮</button>
        <span id="dock-hint">1 day ≈ 6s</span>
      </div>
    </div>

    <div id="ticker"><span id="ticker-inner"></span></div>

    <div id="nametag" class="hidden"></div>
  </div>
</div>

<script src="palette.js?v=1"></script>
<script src="data.js?v=1"></script>
<script src="venues.js?v=1"></script>
<script src="walkers.js?v=1"></script>
<script src="scene.js?v=1"></script>
