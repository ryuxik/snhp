<title>Featured Duel — 3D prototype</title>
<style>
  html, body { margin: 0; height: 100%; background: #07060d; overflow: hidden; }
</style>
<script src="vendor/three.min.js"></script>
<!-- postprocessing addons (r128 UMD, attach to global THREE) — order matters -->
<script src="vendor/three-addons/CopyShader.js"></script>
<script src="vendor/three-addons/LuminosityHighPassShader.js"></script>
<script src="vendor/three-addons/GammaCorrectionShader.js"></script>
<script src="vendor/three-addons/FXAAShader.js"></script>
<script src="vendor/three-addons/EffectComposer.js"></script>
<script src="vendor/three-addons/RenderPass.js"></script>
<script src="vendor/three-addons/ShaderPass.js"></script>
<script src="vendor/three-addons/MaskPass.js"></script>
<script src="vendor/three-addons/UnrealBloomPass.js"></script>
<script src="duel3d.js?v=48"></script>
<script>
  // Canned Prime-vs-Challenger multi-issue logroll. Illustrative numbers — the
  // make-or-break gate is about LEGIBILITY; real numbers come from the server
  // (bundle_frontier) in Step 2.
  // pos per issue: 0 = buyer-favoured (left), 1 = seller-favoured (right).
  const SCRIPT = {
    // who the Challenger is — the tie back to the living sim
    chalOrigin: "Gen 47 champion · House Vulture",
    truth: {
      // Each side's HIDDEN utility: a target per issue (wantS/wantB) AND how much
      // they secretly CARE (weightS/weightB, sum to 1). The logroll lives in the
      // weights: Prime cares about PRICE, the Challenger about TERMS.
      wantS: { PRICE: 0.9, DELIVERY: 0.5, TERMS: 0.5 },
      wantB: { PRICE: 0.5, DELIVERY: 0.5, TERMS: 0.1 },
      weightS: { PRICE: 0.60, DELIVERY: 0.15, TERMS: 0.25 }, // Prime values PRICE most
      weightB: { PRICE: 0.20, DELIVERY: 0.20, TERMS: 0.60 }, // Challenger values TERMS most
    },
    turns: [
      { at: 0.6, actor: "prime", pos: { PRICE: 0.70, DELIVERY: 0.55, TERMS: 0.55 } },
      { at: 1.6, actor: "chal",  pos: { PRICE: 0.62, DELIVERY: 0.50, TERMS: 0.34 } },
      { at: 2.6, actor: "prime", pos: { PRICE: 0.80, DELIVERY: 0.52, TERMS: 0.30 } }, // concedes TERMS to hold PRICE
      { at: 3.6, actor: "chal",  pos: { PRICE: 0.78, DELIVERY: 0.50, TERMS: 0.20 } }, // concedes PRICE to win TERMS
      { at: 4.6, actor: "prime", pos: { PRICE: 0.84, DELIVERY: 0.50, TERMS: 0.17 } },
      { at: 5.6, actor: "chal",  pos: { PRICE: 0.83, DELIVERY: 0.50, TERMS: 0.16 } }, // settle
    ],
    reveal: {
      // `human` = average PAR-seat player on deals like this (later: live PAR aggregate)
      naive: 1.02, human: 1.09, snhp: 1.34, ceiling: 1.38,
      line: "SNHP Prime conceded TERMS to win PRICE; a naive bargainer splits every issue. +31% more pie — and BOTH sides walked away richer.",
    },
  };
  window.addEventListener("load", () => {
    Arena.duel3d.mount(document.body);
    Arena.duel3d.play(SCRIPT);
    // loop the demo once the reveal has played (running stays true by design)
    setInterval(() => { if (Arena.duel3d.finished()) Arena.duel3d.play(SCRIPT); }, 18000);
  });
</script>
