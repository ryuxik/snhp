<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Featured Duel — 3D prototype</title>
<style>
  html, body { margin: 0; height: 100%; background: #07060d; overflow: hidden; }
</style>
<script src="vendor/three.min.js"></script>
<script src="duel3d.js?v=13"></script>
<script>
  // Canned Prime-vs-Challenger multi-issue logroll. Illustrative numbers — the
  // make-or-break gate is about LEGIBILITY; real numbers come from the server
  // (bundle_frontier) in Step 2.
  // pos per issue: 0 = buyer-favoured (left), 1 = seller-favoured (right).
  const SCRIPT = {
    truth: {
      // Prime (seller) secretly values PRICE; Challenger (buyer) secretly values TERMS.
      wantS: { PRICE: 0.9, DELIVERY: 0.5, TERMS: 0.5 },
      wantB: { PRICE: 0.5, DELIVERY: 0.5, TERMS: 0.1 },
    },
    turns: [
      { at: 0.6, actor: "prime", pos: { PRICE: 0.70, DELIVERY: 0.55, TERMS: 0.55 } },
      { at: 1.6, actor: "chal",  pos: { PRICE: 0.62, DELIVERY: 0.50, TERMS: 0.34 } },
      { at: 2.6, actor: "prime", pos: { PRICE: 0.80, DELIVERY: 0.52, TERMS: 0.30 } }, // concedes TERMS to hold PRICE
      { at: 3.6, actor: "chal",  pos: { PRICE: 0.78, DELIVERY: 0.50, TERMS: 0.20 } }, // concedes PRICE to win TERMS
      { at: 4.6, actor: "prime", pos: { PRICE: 0.84, DELIVERY: 0.50, TERMS: 0.17 } },
      { at: 5.6, actor: "chal",  pos: { PRICE: 0.83, DELIVERY: 0.50, TERMS: 0.16 } }, // settle
    ],
    reveal: {
      naive: 1.02, snhp: 1.34, ceiling: 1.38,
      line: "SNHP Prime conceded TERMS to win PRICE; a naive bargainer splits every issue. +31% more pie — and BOTH sides walked away richer.",
    },
  };
  window.addEventListener("load", () => {
    Arena.duel3d.mount(document.body);
    Arena.duel3d.play(SCRIPT);
    // loop the demo
    setInterval(() => { if (!Arena.duel3d.active()) Arena.duel3d.play(SCRIPT); }, 18000);
  });
</script>
