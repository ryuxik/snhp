<header id="topbar">
  <div id="brand">IRRECONCILABLE&nbsp;AGENTS</div>
  <nav id="presets" aria-label="Preset">
    <button data-preset="bloodbath" title="Two people, one dog, no brakes.">The Bloodbath</button>
    <button data-preset="spreadsheets" title="A divorce with itemized receipts.">The Two Spreadsheets</button>
    <button data-preset="nodecree" title="Some filings never clear.">NO DECREE</button>

  <div id="error" hidden></div>

  <section id="scene-act2"   class="scene"></section>
  <section id="scene-act3"   class="scene"></section>
  <section id="scene-decree" class="scene"></section>
</main>

<footer id="foot">
  <p>Nothing on this page is scripted. Every number was produced by the snhp engine
     (deadlock, interview, drafts, decree, receipt) and recorded to the trace this page

</footer>
