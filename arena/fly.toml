# Fly.io app config for the SNHP Evolution Arena (arena.snhp.dev) — the live sim
# + renderer. A separate app from "snhp" (toolkit API) and "par-game" (the daily
# game), sharing the gametheory engine.
#
# One-time setup (from the repo root):
#   fly launch --no-deploy --name snhp-arena --dockerfile arena/Dockerfile
#   fly volumes create arena_data --size 3 -a snhp-arena --region sjc
#   fly certs add arena.snhp.dev -a snhp-arena
#   fly deploy -c arena/fly.toml
#
# Idles when idle: auto_stop = "suspend" + min_machines_running = 0. Suspend (not
# "stop") snapshots memory so the machine resumes in ~ms with numba already warm —
# avoiding the cold-start 502 that a full stop reintroduces (the 40s JIT warmup in
# the healthcheck grace below). The live twin-street world + divorce ledger loop
# pause while suspended and resume on the next request; day-records stay reproducible
# (seed/season/day) and persist to the volume, so a wall-clock gap is harmless.
#
# Also hosts the PAR daily game at /par/ (par.api.router, chrome in arena/web/par/);
# its state is SQLite on this volume via GT_KEYS_DB below — no separate Postgres.

app = "snhp-arena"
primary_region = "sjc"

[build]
  # resolved relative to THIS file's dir; build context is the repo root
  # (deploy with:  fly deploy -c arena/fly.toml  — from the repo root)
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  LOG_LEVEL = "info"
  ARENA_DATA_DIR = "/data"
  ARENA_PERSIST = "1"
  # The LIVE twin-street experiment: one sim-day per 2 minutes, telemetry JSONL
  # on the persistent volume (defaults under ARENA_DATA_DIR). Every day-record
  # is reproducible: python3 -m block.live --seed S --season N --day D
  BLOCK_LIVE = "1"
  BLOCK_LIVE_SECS_PER_DAY = "120"
  # Divorce case ledger on the persistent volume (same number, same divorce)
  DIVORCE_CASES_PATH = "/data/divorce-cases.jsonl"
  # PAR game state (scoreboard/streaks/plays/waitlist/funnel/advice) — SQLite on the
  # volume via gametheory._db. No DATABASE_URL set, so par uses this file, not Postgres.
  GT_KEYS_DB = "/data/par.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "suspend"      # idle → suspend (warm resume, no 502); not always-on
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "40s"              # numba JIT warmup before healthy
    method = "GET"
    path = "/health"

[[mounts]]
  source = "arena_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"                      # numpy+scipy+numba baseline + compile spikes
  cpu_kind = "shared"
  cpus = 2
