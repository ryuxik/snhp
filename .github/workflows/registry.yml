name: Publish to MCP Registry

# Updates the official MCP registry listing (io.github.ryuxik/snhp-negotiation)
# from server.json via GitHub OIDC — no token. Fires after each Release, or
# manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # GitHub OIDC for the io.github.ryuxik/* namespace
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -fL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
