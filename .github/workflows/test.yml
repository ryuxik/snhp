name: Tests

# Runs the pytest suite on every push and PR. Until now CI only built the wheel
# and the MCP registry entry on release — nothing ran the tests. This is the
# safety net for the redesign: the golden-reproduction tests (boba/vend/fashion)
# and the engine property tests plug in here as they land.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (runtime + test deps; no ANTHROPIC_API_KEY needed)
        # negmas is the negotiation substrate used by gametheory.negotiation._sim
        # (run_matchup -> b2b_round_robin.create_issues/create_ufuns) — a real
        # runtime dep of the peer-mode tests, not just tuning. Installed explicitly
        # (the heavy rest of the `snhp` extra — optuna/pandas/sklearn — is not needed).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,arena,prod]" negmas
      - name: Run non-slow suite
        # `slow` = perf-budget tests (deselect with -m 'not slow'); run from the
        # repo root so the vertical packages import via rootdir on sys.path.
        run: python -m pytest -q -m "not slow" -p no:cacheprovider
